# =============================================================================
# Infrastructure — Services Layer
# =============================================================================
# Creates the Railway project and project-level services. These are created
# ONCE and shared by all environments. Run this before infra-environment.yml.
#
# Services are the "skeleton" — the environment layer fills in the config
# (source repo/image, variables, domains, resource limits) per environment.
#
# Railway auto-deploys when it detects a connected repo+branch, so code
# deployments need no pipeline. This workflow is only for infrastructure
# changes: adding a service, changing a Docker image, etc.
#
# Safe to re-run — idempotent.
# =============================================================================

name: "Infra: Services"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  contents: read

jobs:
  deploy:
    name: Services — ${{ inputs.action }}
    runs-on: ubuntu-latest

    concurrency:
      group: infra-services
      cancel-in-progress: false

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # Add your state backend env vars here, e.g.:
      # PG_CONN_STR: ${{ secrets.OPENTOFU_STATE_POSTGRES_DB_URL }}
      # TF_ENCRYPTION: ${{ secrets.TOFU_STATE_ENCRYPTION_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Initialize
        working-directory: infra/services
        run: tofu init
        # For pg backend: tofu init -backend-config="conn_str=$PG_CONN_STR"

      - name: Validate
        working-directory: infra/services
        run: tofu validate

      - name: Plan
        working-directory: infra/services
        run: tofu plan -out=services.tfplan

      - name: Apply
        if: inputs.action == 'apply'
        working-directory: infra/services
        run: tofu apply services.tfplan

      - name: Destroy
        if: inputs.action == 'destroy'
        working-directory: infra/services
        run: tofu destroy -auto-approve

      - name: Show outputs
        if: inputs.action == 'apply'
        working-directory: infra/services
        run: |
          echo "=== Services Created ==="
          echo "Project ID: $(tofu output -raw project_id)"
          echo "Project Name: $(tofu output -raw project_name)"
          tofu output -json | jq -r 'to_entries[] | "  \(.key): \(.value.value)"'
