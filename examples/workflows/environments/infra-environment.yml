# =============================================================================
# Infrastructure — Environment Layer
# =============================================================================
# Creates/updates per-environment Railway configuration: environment, service
# instances (source, build, deploy settings, resource limits), volumes,
# variables, domains, and DNS records.
#
# Uses OpenTofu workspaces to isolate state per environment (dev, qa, prd).
# Service IDs are discovered at plan time via data sources — no need to
# commit IDs to the repo or pass them between pipelines.
#
# Prerequisites:
#   - infra-services.yml has run (project + services exist in Railway)
#   - GitHub environment secrets configured for the target environment
#
# Safe to re-run — idempotent.
# =============================================================================

name: "Infra: Environment"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prd
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ inputs.environment }} — ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    concurrency:
      group: infra-environment-${{ inputs.environment }}
      cancel-in-progress: false

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # App secrets — passed as TF_VAR_* for railway_variable resources
      TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
      TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
      # Add your state backend and other env vars here, e.g.:
      # PG_CONN_STR: ${{ secrets.OPENTOFU_STATE_POSTGRES_DB_URL }}
      # TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Initialize
        working-directory: infra/environments
        run: tofu init
        # For pg backend: tofu init -backend-config="conn_str=$PG_CONN_STR"

      - name: Select workspace
        working-directory: infra/environments
        run: tofu workspace select -or-create ${{ inputs.environment }}

      - name: Validate
        working-directory: infra/environments
        run: tofu validate

      - name: Plan
        working-directory: infra/environments
        run: tofu plan -out=environment.tfplan

      # Parallelism throttled — each railway_variable triggers a service
      # redeploy. Too many concurrent redeploys can hit Railway rate limits.
      - name: Apply
        if: inputs.action == 'apply'
        working-directory: infra/environments
        run: tofu apply -parallelism=5 environment.tfplan

      - name: Destroy
        if: inputs.action == 'destroy'
        working-directory: infra/environments
        run: tofu destroy -auto-approve -parallelism=5

      - name: Show outputs
        if: inputs.action == 'apply'
        working-directory: infra/environments
        run: |
          echo "=== ${{ inputs.environment }} Deployment Complete ==="
          tofu output -json | jq -r 'to_entries[] | "  \(.key): \(.value.value)"'
