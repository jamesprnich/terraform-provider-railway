name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  # Run the full CI pipeline against the tagged commit before publishing.
  # This closes the gap where a merge-squash to main could introduce a
  # regression that CI-on-main hadn't finished checking by the time a tag
  # is pushed. Belt-and-braces: if this job fails, goreleaser is skipped
  # via the `needs:` dependency and no release ever ships.
  check:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.8
          tofu_wrapper: false
      - name: Install deps
        run: go mod download
      - name: Build
        run: go build -v .
      - name: Vet
        run: go vet ./...
      - name: Check generated code freshness
        run: |
          go run github.com/Khan/genqlient
          git diff --exit-code internal/provider/generated.go || {
            echo "::error::generated.go is stale in the tagged commit. Regenerate and re-tag."
            exit 1
          }
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          args: --timeout=5m
      - name: Unit tests
        env:
          TF_ACC_PROVIDER_NAMESPACE: jamesprnich
          TF_ACC_PROVIDER_HOST: registry.opentofu.org
        run: |
          TF_ACC_TERRAFORM_PATH="$(which tofu)" go test -v -timeout 5m ./internal/provider/
      # Fail if the tag doesn't have a matching CHANGELOG entry. Cheap
      # backstop for "tagged v0.11.X without updating the changelog" — the
      # release notes generation depends on this entry existing.
      - name: CHANGELOG entry for tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## ${TAG_VERSION}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## ${TAG_VERSION}' entry for tag ${GITHUB_REF_NAME}."
            echo "::error::Add a section for this release under CHANGELOG.md before tagging."
            exit 1
          fi

  goreleaser:
    name: goreleaser
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
