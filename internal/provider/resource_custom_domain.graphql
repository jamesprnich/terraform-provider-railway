fragment CustomDomain on CustomDomain {
  id
  domain
  targetPort
  status {
    dnsRecords {
      hostlabel
      requiredValue
      zone
    }
  }
  environmentId
  serviceId
}

query listCustomDomains(
  $environmentId: String!
  $serviceId: String!
  $projectId: String!
) {
  domains(
    environmentId: $environmentId
    serviceId: $serviceId
    projectId: $projectId
  ) {
    customDomains {
      ...CustomDomain
    }
  }
}

# @genqlient(for: "CustomDomainCreateInput.targetPort", omitempty: true, pointer: true)
mutation createCustomDomain(
  $input: CustomDomainCreateInput!
) {
  customDomainCreate(input: $input) {
    ...CustomDomain
  }
}

mutation deleteCustomDomain($id: String!) {
  customDomainDelete(id: $id)
}

mutation updateCustomDomain($environmentId: String!, $id: String!, $targetPort: Int) {
  customDomainUpdate(environmentId: $environmentId, id: $id, targetPort: $targetPort)
}
